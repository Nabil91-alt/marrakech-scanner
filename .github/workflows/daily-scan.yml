name: Marrakech Immobilien-Scan

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Scraper starten
        run: - run: python scraper.py --output data/latest_raw.json --pages 3

      - name: KI-Analyse
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python analyzer.py --input data/latest_raw.json --output data/latest.json

      - name: Archivieren und committen
        run: |
          DATE=$(date +%Y-%m-%d)
          cp data/latest.json "data/scan_${DATE}.json" 2>/dev/null || true
          git config user.name "Marrakech Bot"
          git config user.email "bot@scanner.local"
          git add data/
          git diff --staged --quiet || git commit -m "Scan ${DATE}"
          git push
