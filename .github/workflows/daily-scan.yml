name: Marrakech Immobilien-Scan

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scraper.py --output data/latest.json --pages 5
      - run: |
          DATE=$(date +%Y-%m-%d)
          cp data/latest.json "data/scan_${DATE}.json" 2>/dev/null || true
      - run: |
          git config user.name "Marrakech Bot"
          git config user.email "bot@scanner.local"
          git add data/
          git diff --staged --quiet || git commit -m "Scan $(date +%Y-%m-%d)"
          git push
