<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silbertablett — Marrakech</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2;
      --card: #FFFFFF;
      --border: #E8E0D4;
      --text: #2C2418;
      --text2: #6B5E4F;
      --text3: #A69882;
      --accent: #C4622A;
      --accent2: #D4883E;
      --green: #2D8B55;
      --green-bg: #EDF7F0;
      --red: #C44B2A;
      --red-bg: #FDF0ED;
      --yellow: #B8862E;
      --yellow-bg: #FBF6EC;
      --blue: #2A6BC4;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(44,36,24,0.06), 0 4px 12px rgba(44,36,24,0.04);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',system-ui,sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; }
    h1,h2,h3 { font-family:'Source Serif 4',Georgia,serif; }

    .container { max-width:840px; margin:0 auto; padding:0 16px; }
    @media(min-width:768px) { .container { padding:0 24px; } }

    /* Header */
    .header { background:white; border-bottom:1px solid var(--border); padding:16px 0; position:sticky; top:0; z-index:50; }
    .header-inner { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
    .header h1 { font-size:20px; font-weight:700; color:var(--text); letter-spacing:-0.02em; }
    .header h1 span { color:var(--accent); }
    .header-meta { font-size:12px; color:var(--text3); text-align:right; }

    /* Pipeline */
    .pipeline { display:flex; gap:4px; align-items:center; flex-wrap:wrap; padding:12px 0; font-size:11px; color:var(--text3); }
    .pipeline-step { background:white; border:1px solid var(--border); padding:3px 10px; border-radius:20px; white-space:nowrap; }
    .pipeline-arrow { color:var(--border); font-size:10px; }

    /* Status bar */
    .status-bar { background:white; border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
    .status-dot.on { background:var(--green); }
    .status-dot.off { background:var(--red); }

    /* Buttons */
    .btn { border:none; border-radius:8px; padding:10px 20px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
    .btn-primary { background:var(--accent); color:white; box-shadow:0 2px 8px rgba(196,98,42,0.25); }
    .btn-primary:hover { background:#B5551F; }
    .btn-primary:disabled { opacity:0.5; cursor:wait; }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
    .btn-outline:hover { border-color:var(--text3); }
    .btn-sm { padding:6px 14px; font-size:12px; }
    .btn-danger { background:transparent; border:1px solid #E8D0D0; color:var(--red); }
    .actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }

    /* Tabs */
    .tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:2px solid var(--border); padding-bottom:0; overflow-x:auto; }
    .tab { padding:8px 16px; font-size:13px; font-weight:500; color:var(--text3); background:none; border:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; white-space:nowrap; font-family:inherit; transition:all .15s; }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab:hover { color:var(--text); }

    /* Cards */
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; box-shadow:var(--shadow); overflow:hidden; transition:border-color .2s; }
    .card:hover { border-color:var(--text3); }
    .card-head { padding:16px; cursor:pointer; display:flex; gap:14px; align-items:flex-start; }
    @media(max-width:480px) { .card-head { padding:12px; gap:10px; } }

    /* Score circle */
    .score-ring { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative; }
    .score-num { font-size:16px; font-weight:700; font-family:'DM Sans',monospace; }
    @media(max-width:480px) { .score-ring { width:44px; height:44px; } .score-num { font-size:14px; } }

    /* Verdict badges */
    .verdict { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:0.02em; }
    .verdict-top { background:var(--green-bg); color:var(--green); }
    .verdict-int { background:var(--yellow-bg); color:var(--yellow); }
    .verdict-bed { background:#FFF4ED; color:#C46B2A; }
    .verdict-no { background:var(--red-bg); color:var(--red); }

    .market-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; }

    /* Card body */
    .card-body { padding:0 16px 16px; border-top:1px solid var(--border); }
    @media(max-width:480px) { .card-body { padding:0 12px 12px; } }

    /* Score bars */
    .bar-row { margin-bottom:8px; }
    .bar-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:3px; }
    .bar-track { height:6px; background:#F0EBE3; border-radius:6px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:6px; transition:width .8s ease; }

    /* Detail grid */
    .detail-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; margin-bottom:14px; }
    @media(max-width:600px) { .detail-grid { grid-template-columns:repeat(2, 1fr); } }
    .detail-cell { background:var(--bg); border-radius:8px; padding:8px 10px; }
    .detail-cell label { font-size:10px; color:var(--text3); display:block; margin-bottom:1px; text-transform:uppercase; letter-spacing:0.04em; }
    .detail-cell span { font-size:13px; font-weight:500; color:var(--text); }

    /* Tags */
    .tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
    .tag { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:500; }
    .tag-yes { background:var(--green-bg); color:var(--green); }
    .tag-no { background:var(--red-bg); color:var(--red); }
    .tag-unknown { background:#F5F2ED; color:var(--text3); }

    /* Sections */
    .section-box { background:var(--bg); border-radius:10px; padding:14px; margin-bottom:12px; }
    .section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
    .section-title.green { color:var(--green); }
    .section-title.red { color:var(--red); }
    .section-title.accent { color:var(--accent); }

    .lage-box { border-left:3px solid var(--accent2); padding-left:14px; }

    /* Verdict box */
    .verdict-box { border-radius:10px; padding:14px; margin-bottom:12px; }
    .verdict-box.top { background:var(--green-bg); border:1px solid #C5E0CF; }
    .verdict-box.int { background:var(--yellow-bg); border:1px solid #E8DCC0; }
    .verdict-box.bed { background:#FFF4ED; border:1px solid #E8D0C0; }

    /* Action links */
    .action-links { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:14px; }
    .action-link { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:12px; font-weight:600; text-decoration:none; transition:all .15s; }
    .action-link.inserat { background:var(--accent); color:white; }
    .action-link.inserat:hover { background:#B5551F; }
    .action-link.phone { background:var(--green); color:white; }
    .action-link.phone:hover { background:#256D45; }
    .action-link.contact-name { font-size:12px; color:var(--text2); }

    /* Comparison table */
    .compare-table { width:100%; border-collapse:collapse; font-size:12px; }
    .compare-table th { text-align:left; padding:6px 8px; color:var(--text3); font-weight:500; border-bottom:2px solid var(--border); font-size:11px; }
    .compare-table td { padding:8px; border-bottom:1px solid var(--border); color:var(--text2); }
    .compare-table tr:hover td { background:var(--bg); }

    /* Rejected log */
    .rej-toggle { background:none; border:none; color:var(--text3); font-size:12px; cursor:pointer; padding:0; font-family:inherit; }
    .rej-list { background:white; border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin-top:8px; max-height:200px; overflow-y:auto; }
    .rej-item { font-size:11px; color:var(--text3); margin-bottom:4px; display:flex; gap:8px; }
    .rej-item .x { color:var(--red); flex-shrink:0; }

    /* Setup panel */
    .setup-panel { background:white; border:1px solid var(--accent2); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
    .setup-panel input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:13px; font-family:inherit; color:var(--text); outline:none; margin-bottom:12px; }
    .setup-panel input:focus { border-color:var(--accent); }

    /* Checklist */
    .checklist-item { font-size:12px; color:var(--text); padding:4px 0; padding-left:4px; }

    /* Dots */
    .dots { display:inline-flex; gap:3px; }
    .dot { width:6px; height:6px; border-radius:50%; }
    .dot.on { background:var(--accent2); }
    .dot.off { background:#E8E0D4; }

    /* Two-col layout */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:14px; }
    @media(max-width:600px) { .two-col { grid-template-columns:1fr; } }

    /* Empty state */
    .empty { text-align:center; padding:60px 20px; }
    .empty-icon { font-size:48px; margin-bottom:16px; opacity:0.4; }

    /* Score colors */
    .sc-green { color:var(--green); }
    .sc-yellow { color:var(--yellow); }
    .sc-orange { color:#C46B2A; }
    .sc-red { color:var(--red); }

    /* Smooth expand */
    .expand-arrow { transition:transform .2s; display:inline-block; color:var(--text3); font-size:14px; flex-shrink:0; }
    .expand-arrow.open { transform:rotate(180deg); }

    .star-btn { background:none; border:none; font-size:20px; cursor:pointer; padding:2px; flex-shrink:0; line-height:1; }

    /* Gate badges */
    .gate-badges { display:flex; gap:6px; flex-wrap:wrap; padding:14px 0 12px; }
    .gate-badge { font-size:10px; font-weight:500; padding:3px 10px; border-radius:20px; background:var(--green-bg); color:var(--green); }
  </style>
</head>
