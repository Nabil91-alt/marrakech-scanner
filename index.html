<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silbertablett — Marrakech</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0c0b08;color:#e8e0d0;font-family:'Outfit',system-ui,sans-serif}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0c0b08}::-webkit-scrollbar-thumb{background:#2a2520;border-radius:9px}
    a{color:#d4a24e}input,textarea{font-family:inherit}
    .wrap{max-width:800px;margin:0 auto;padding:14px 16px 60px}
    .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.03em;white-space:nowrap}
    .card{border-radius:14px;margin-bottom:10px;overflow:hidden;position:relative}
    .card-head{padding:13px 14px;cursor:pointer;display:flex;gap:11px;align-items:center;user-select:none}
    .ring{width:48px;height:48px;border-radius:99px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ring-inner{width:36px;height:36px;border-radius:99px;background:#141210;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:monospace}
    .tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:500;margin:0 3px 4px 0}
    .bar-track{height:5px;background:#1f1d17;border-radius:9px}.bar-fill{height:100%;border-radius:9px;transition:width .8s cubic-bezier(.16,1,.3,1)}
    .btn{border:none;border-radius:8px;padding:8px 14px;font-size:11px;cursor:pointer;font-family:inherit}
    .btn-primary{background:linear-gradient(135deg,#22c55e,#16a34a);color:#0c0b08;font-size:14px;font-weight:700;padding:12px 24px;border-radius:10px;box-shadow:0 2px 24px #22c55e20}
    .btn-ghost{background:none;border:1px solid #1f1d17;color:#6b6560}
    .panel{background:#141210;border:1px solid #1f1d17;border-radius:10px;padding:10px 14px;margin-bottom:12px}
    .gate-badge{font-size:9px;color:#22c55e;background:#091f12;padding:2px 8px;border-radius:99px;border:1px solid #22c55e15}
    .detail-box{background:#1a1810;border-radius:6px;padding:4px 7px}
    .detail-label{font-size:8px;color:#4a4540;letter-spacing:.04em}
    .detail-val{font-size:11px;color:#ccc5b8;font-weight:500}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const {useState,useEffect,useCallback,useRef}=React;

    function getAutoUrl(){
      const h=window.location.hostname;
      if(h.endsWith('.github.io')){
        const u=h.replace('.github.io','');
        const r=window.location.pathname.split('/')[1]||'marrakech-scanner';
        return`https://raw.githubusercontent.com/${u}/${r}/main/data/latest.json`;
      }
      return localStorage.getItem('mkch-url')||'';
    }

    const sc=s=>s>=80?"#22c55e":s>=70?"#6ee7a0":s>=60?"#d4a24e":s>=45?"#e08a3c":"#ef4444";
    const viMap={"TOP-KANDIDAT":{bg:"#091f12",bd:"#22c55e",c:"#22c55e",i:"★"},"INTERESSANT":{bg:"#1f1a08",bd:"#d4a24e",c:"#d4a24e",i:"◆"},"BEDINGT GEEIGNET":{bg:"#1f1208",bd:"#e08a3c",c:"#e08a3c",i:"▲"},"NICHT GEEIGNET":{bg:"#1f0808",bd:"#ef4444",c:"#ef4444",i:"✕"}};
    const vi=v=>viMap[v]||{bg:"#1a1a17",bd:"#555",c:"#888",i:"?"};
    const fmt=(n,c="MAD")=>n?n.toLocaleString("de-DE")+" "+c:"—";

    function Pill({children,color="#888",bg="#1f1d17"}){return<span className="pill" style={{color,background:bg,border:`1px solid ${color}30`}}>{children}</span>}
    function Bar({value=0,label,detail}){return(<div style={{marginBottom:7}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#6b6560",marginBottom:2}}><span>{label}</span><span style={{display:"flex",gap:6,alignItems:"center"}}>{detail&&<span style={{fontSize:9,color:"#4a4540"}}>{detail}</span>}<span style={{color:sc(value),fontWeight:600,fontFamily:"monospace"}}>{value}</span></span></div><div className="bar-track"><div className="bar-fill" style={{width:`${Math.min(100,Math.max(0,value))}%`,background:sc(value)}}/></div></div>)}
    function Tag({label,val}){const c=val===true?"#22c55e":val===false?"#ef4444":"#4a4540";const bg=val===true?"#091f12":val===false?"#1f0808":"#1a1a17";return<span className="tag" style={{color:c,background:bg,border:`1px solid ${c}20`}}>{val===true?"✓":val===false?"✕":"?"} {label}</span>}
    function Dots({n=0}){return<span style={{display:"inline-flex",gap:2}}>{Array.from({length:5},(_,i)=><span key={i} style={{width:5,height:5,borderRadius:99,background:i<n?"#d4a24e":"#1f1d17"}}/>)}</span>}

    function Card({d,starred,onStar}){
      const[open,setOpen]=useState(false);
      const v=vi(d.verdict);
      const s=d.scores||{};
      return(
        <div className="card" style={{background:"#141210",border:`1px solid ${v.bd}20`}}>
          <div className="card-head" onClick={()=>setOpen(!open)}>
            <div className="ring" style={{background:`conic-gradient(${v.c} ${(s.overall||0)*3.6}deg, #1f1d17 0deg)`}}><div className="ring-inner" style={{color:v.c}}>{s.overall||0}</div></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:2}}>
                <Pill color={v.c} bg={v.bg}>{v.i} {d.verdict}</Pill>
                {d.market_price_assessment&&d.market_price_assessment!=="Nicht beurteilbar"&&<Pill color={d.market_price_assessment==="Unter Markt"?"#22c55e":d.market_price_assessment==="Über Markt"?"#ef4444":"#d4a24e"}>{d.market_price_assessment==="Unter Markt"?"↓":d.market_price_assessment==="Über Markt"?"↑":"≈"} {d.market_price_assessment}</Pill>}
                <span style={{color:"#d4a24e",fontWeight:600,fontSize:13}}>{fmt(d.price_mad)}</span>
                {d.price_eur&&<span style={{color:"#4a4540",fontSize:11}}>≈ {fmt(d.price_eur,"€")}</span>}
              </div>
              <div style={{fontWeight:600,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.title}</div>
              <div style={{color:"#6b6560",fontSize:11,display:"flex",gap:10,flexWrap:"wrap",marginTop:1}}>
                {d.neighborhood&&<span>📍 {d.neighborhood}</span>}
                {d.area_sqm&&<span>{d.area_sqm}m²</span>}
                {d.rooms&&<span>{d.rooms}Zi</span>}
                {d.price_per_sqm_mad&&<span>{fmt(d.price_per_sqm_mad)}/m²</span>}
                {d.source&&<span style={{color:"#4a4540"}}>{d.source}</span>}
              </div>
            </div>
            <button onClick={e=>{e.stopPropagation();onStar(d.id)}} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:starred?"#d4a24e":"#2a2520",padding:2,flexShrink:0}}>{starred?"★":"☆"}</button>
            <span style={{color:"#4a4540",fontSize:13,transform:open?"rotate(180deg)":"",transition:"transform .2s",flexShrink:0}}>▾</span>
          </div>
          {open&&(
            <div style={{borderTop:"1px solid #1f1d17",padding:14}}>
              <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
                {["Scraper ✓","Filter-Gates ✓","KI-Analyse ✓"].map((g,i)=><span key={i} className="gate-badge">{g}</span>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                <div>
                  <Bar value={s.budget_fit} label="Budget" detail="25%"/>
                  <Bar value={s.location_fit} label="Lage" detail="25%"/>
                  <Bar value={s.size_fit} label="Größe" detail="15%"/>
                  <Bar value={s.amenities_fit} label="Ausstattung" detail="20%"/>
                  <Bar value={s.investment_fit} label="Investment" detail="15%"/>
                  {(s.info_penalty||0)<0&&<div style={{fontSize:10,color:"#e08a3c",marginTop:2}}>⚠ Info-Abzug: {s.info_penalty}</div>}
                </div>
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:10}}>
                    {[["Typ",d.property_type],["Etage",d.floor],["Zimmer",d.rooms],["Betten",d.bedrooms],["Bäder",d.bathrooms],["Zustand",d.condition],["Fläche",d.area_sqm?d.area_sqm+"m²":null],["Eigentum",d.ownership_type]].map(([l,val],i)=>(
                      <div key={i} className="detail-box" style={{border:l==="Eigentum"&&val==="Unbekannt"?"1px solid #e08a3c33":"none"}}>
                        <div className="detail-label">{l}</div>
                        <div className="detail-val" style={{color:l==="Eigentum"&&val==="Unbekannt"?"#e08a3c":undefined}}>{val??"—"}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap"}}>
                    <Tag label="Terrasse" val={d.has_terrace}/><Tag label="Pool" val={d.has_pool}/><Tag label="Parkplatz" val={d.has_parking}/><Tag label="Aufzug" val={d.has_elevator}/><Tag label="Neubau" val={d.is_new_build}/>
                  </div>
                </div>
              </div>
              {d.neighborhood_outlook&&(
                <div style={{background:"#1a1810",borderLeft:"3px solid #d4a24e",borderRadius:8,padding:10,marginBottom:12}}>
                  <div style={{fontSize:10,color:"#d4a24e",fontWeight:600,marginBottom:3}}>LAGE — {d.neighborhood}</div>
                  <div style={{fontSize:11,color:"#a8a090",lineHeight:1.5}}>{d.neighborhood_outlook}</div>
                  <div style={{display:"flex",gap:16,marginTop:6}}>
                    <span style={{fontSize:10,color:"#6b6560"}}>Investment <Dots n={d.investment_potential}/></span>
                    <span style={{fontSize:10,color:"#6b6560"}}>Leben <Dots n={d.livability_score}/></span>
                  </div>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div><div style={{fontSize:10,color:"#22c55e",fontWeight:600,marginBottom:4}}>STÄRKEN</div>{(d.highlights||[]).map((h,i)=><div key={i} style={{fontSize:11,color:"#a8a090",marginBottom:2}}>+ {h}</div>)}</div>
                <div><div style={{fontSize:10,color:"#ef4444",fontWeight:600,marginBottom:4}}>RISIKEN</div>{(d.concerns||[]).map((c,i)=><div key={i} style={{fontSize:11,color:"#a8a090",marginBottom:2}}>– {c}</div>)}</div>
              </div>
              <div style={{background:v.bg,border:`1px solid ${v.bd}30`,borderRadius:8,padding:10,marginBottom:12}}>
                <div style={{fontSize:11,color:v.c,fontWeight:600}}>{v.i} {d.verdict}</div>
                <div style={{fontSize:11,color:"#a8a090",lineHeight:1.5,marginTop:2}}>{d.verdict_reason}</div>
                {d.verhandlung_tipps&&<div style={{fontSize:11,color:"#d4a24e",marginTop:6}}>💡 {d.verhandlung_tipps}</div>}
              </div>
              {d.besichtigung_fragen?.length>0&&(
                <div style={{background:"#1a1810",borderRadius:8,padding:10,marginBottom:12}}>
                  <div style={{fontSize:10,color:"#6b6560",fontWeight:600,marginBottom:4}}>📋 BESICHTIGUNGS-CHECKLISTE</div>
                  {d.besichtigung_fragen.map((q,i)=><div key={i} style={{fontSize:11,color:"#ccc5b8",marginBottom:3,paddingLeft:10}}>☐ {q}</div>)}
                </div>
              )}
              {d.url&&<a href={d.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",padding:"7px 16px",background:"#1a1810",border:"1px solid #2a2520",borderRadius:8,fontSize:11,textDecoration:"none",fontWeight:500}}>🔗 Original-Inserat</a>}
            </div>
          )}
        </div>
      );
    }

    function App(){
      const[leads,setLeads]=useState([]);
      const[favs,setFavs]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem('mkch-favs'))||[])}catch{return new Set()}});
      const[loading,setLoading]=useState(false);
      const[status,setStatus]=useState("");
      const[filter,setFilter]=useState("all");
      const[meta,setMeta]=useState(null);
      const[rejLog,setRejLog]=useState([]);
      const[showRej,setShowRej]=useState(false);
      const[showSetup,setShowSetup]=useState(false);
      const[dataUrl,setDataUrl]=useState(()=>getAutoUrl());
      const[urlInput,setUrlInput]=useState(()=>getAutoUrl());

      useEffect(()=>{localStorage.setItem('mkch-favs',JSON.stringify([...favs]))},[favs]);
      const toggleFav=useCallback(id=>setFavs(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n}),[]);

      const fetchData=useCallback(async()=>{
        const url=dataUrl;
        if(!url){setShowSetup(true);setStatus("❌ Keine Daten-URL konfiguriert.");return}
        setLoading(true);setStatus("Lade Daten…");
        try{
          const r=await fetch(url+"?t="+Date.now());
          if(!r.ok)throw new Error(`HTTP ${r.status}`);
          const data=await r.json();
          setLeads(data.listings||[]);
          setMeta(data.meta||null);
          setRejLog(data.rejected_log||[]);
          const n=data.listings?.length||0;
          const t=data.meta?.top_count||0;
          setStatus(`✅ ${n} Leads geladen (${t} Top-Kandidaten)`);
          setTimeout(()=>setStatus(""),5000);
        }catch(e){
          console.error(e);
          setStatus(`❌ Fehler: ${e.message}. Prüfe URL in Einstellungen.`);
        }
        setLoading(false);
      },[dataUrl]);

      useEffect(()=>{if(dataUrl){fetchData()}},[]);

      const saveUrl=()=>{const u=urlInput.trim();setDataUrl(u);localStorage.setItem('mkch-url',u);setShowSetup(false)};

      const filtered=leads.filter(l=>{
        if(filter==="top")return l.verdict==="TOP-KANDIDAT";
        if(filter==="starred")return favs.has(l.id);
        return true;
      }).sort((a,b)=>{
        if(favs.has(a.id)!==favs.has(b.id))return favs.has(a.id)?-1:1;
        return(b.scores?.overall||0)-(a.scores?.overall||0);
      });

      const topN=leads.filter(l=>l.verdict==="TOP-KANDIDAT").length;
      const intN=leads.filter(l=>l.verdict==="INTERESSANT").length;
      const starN=leads.filter(l=>favs.has(l.id)).length;

      return(
        <div>
          <div style={{borderBottom:"1px solid #1f1d17",padding:"18px 16px 14px"}}>
            <div style={{maxWidth:800,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:"#d4a24e",letterSpacing:".14em"}}>MARRAKECH</div>
                <h1 style={{fontSize:22,fontWeight:800,letterSpacing:"-.03em"}}>Silbertablett</h1>
                <p style={{marginTop:2,fontSize:11,color:"#6b6560"}}>Automatisch gescrapt · Streng gefiltert · KI-analysiert</p>
              </div>
              <div style={{textAlign:"right",fontSize:10,color:"#4a4540"}}>
                {meta?.analyzed_at&&<div>Analyse: {new Date(meta.analyzed_at).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</div>}
                <div>{leads.length} Leads · {topN} top · {intN} interessant</div>
              </div>
            </div>
          </div>

          <div className="wrap">
            <div className="panel" style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
              {["⏰ Täglich 8:00","🐍 Scraper","🚧 Filter","🔬 Claude KI","☁️ GitHub","📊 Dashboard"].map((s,i)=>(
                <span key={i} style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:10,color:"#d4a24e",background:"#1f1a08",padding:"2px 7px",borderRadius:99,border:"1px solid #d4a24e15"}}>{s}</span>
                  {i<5&&<span style={{color:"#2a2520",fontSize:8}}>→</span>}
                </span>
              ))}
            </div>

            <div className="panel" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{width:8,height:8,borderRadius:99,background:dataUrl?"#22c55e":"#ef4444"}}/>
                <span style={{fontSize:11,color:dataUrl?"#a8a090":"#6b6560"}}>{dataUrl?"Datenquelle verbunden":"Nicht verbunden"}</span>
                {meta&&<span style={{fontSize:10,color:"#4a4540"}}>· {meta.analyzed_count||0} analysiert · {meta.qualified_count||0} qualifiziert</span>}
              </div>
              <button className="btn btn-ghost" style={{fontSize:10,padding:"4px 12px"}} onClick={()=>setShowSetup(!showSetup)}>⚙</button>
            </div>

            {showSetup&&(
              <div className="panel" style={{borderColor:"#d4a24e25",padding:16}}>
                <div style={{fontSize:12,color:"#d4a24e",fontWeight:600,marginBottom:10}}>⚙ Daten-URL</div>
                <div style={{fontSize:11,color:"#6b6560",marginBottom:10}}>Wird auf GitHub Pages automatisch erkannt. Sonst Raw-URL eintragen.</div>
                <input value={urlInput} onChange={e=>setUrlInput(e.target.value)} placeholder="https://raw.githubusercontent.com/..." style={{width:"100%",background:"#1a1810",color:"#e8e0d0",border:"1px solid #1f1d17",borderRadius:8,padding:"8px 10px",fontSize:12,outline:"none",boxSizing:"border-box",marginBottom:10}}/>
                <button className="btn" style={{background:"#d4a24e",color:"#0c0b08",fontWeight:600,padding:"8px 20px"}} onClick={saveUrl}>Speichern</button>
              </div>
            )}

            <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <button className="btn btn-primary" disabled={loading} onClick={fetchData} style={{opacity:loading?.6:1,cursor:loading?"wait":"pointer"}}>{loading?"⏳ Läuft…":"🔄 Daten aktualisieren"}</button>
              {leads.length>0&&<button className="btn" style={{background:"none",border:"1px solid #2e1515",color:"#4a2020",marginLeft:"auto"}} onClick={()=>{setLeads([]);setMeta(null);setRejLog([])}}>Reset</button>}
            </div>

            {status&&<div className="panel" style={{fontSize:11,color:status.startsWith("✅")?"#22c55e":status.startsWith("❌")?"#ef4444":"#d4a24e"}}>{status}</div>}

            {rejLog.length>0&&(
              <div style={{marginBottom:12}}>
                <button style={{background:"none",border:"none",color:"#4a4540",fontSize:10,cursor:"pointer",padding:0}} onClick={()=>setShowRej(!showRej)}>{showRej?"▾":"▸"} {rejLog.length} vom Scraper abgelehnt</button>
                {showRej&&<div className="panel" style={{marginTop:6,maxHeight:200,overflowY:"auto"}}>
                  {rejLog.map((r,i)=><div key={i} style={{fontSize:10,color:"#6b6560",marginBottom:3}}><span style={{color:"#ef4444"}}>✕ </span><span style={{color:"#8a8070"}}>{r.title}</span> — <span style={{color:"#4a4540"}}>{r.reason}</span></div>)}
                </div>}
              </div>
            )}

            {leads.length>0&&(
              <div style={{display:"flex",gap:5,marginBottom:14,borderBottom:"1px solid #1f1d17",paddingBottom:10}}>
                {[{k:"all",l:`Alle (${leads.length})`},{k:"top",l:`★ Top (${topN})`},{k:"starred",l:`⭐ Gemerkt (${starN})`}].map(t=>(
                  <button key={t.k} className="btn" style={{background:filter===t.k?"#1f1d17":"transparent",color:filter===t.k?"#d4a24e":"#4a4540",border:`1px solid ${filter===t.k?"#d4a24e25":"transparent"}`,fontSize:11,fontWeight:500,padding:"5px 12px"}} onClick={()=>setFilter(t.k)}>{t.l}</button>
                ))}
              </div>
            )}

            {filtered.length>0?filtered.map(l=><Card key={l.id} d={l} starred={favs.has(l.id)} onStar={toggleFav}/>)
            :leads.length>0?<div style={{textAlign:"center",padding:30,color:"#4a4540",fontSize:12}}>Keine Inserate in diesem Filter.</div>
            :!loading&&<div style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{fontSize:48,marginBottom:14,opacity:.25}}>🏡</div>
              <div style={{color:"#6b6560",fontSize:14,marginBottom:8}}>Euer Silbertablett ist bereit.</div>
              <div style={{color:"#4a4540",fontSize:12}}>{dataUrl?"Klickt oben auf Daten aktualisieren.":"Klickt ⚙ und tragt die GitHub-URL ein."}</div>
            </div>}

            {filtered.length>=2&&(
              <div className="panel" style={{marginTop:10,overflowX:"auto",borderRadius:12,padding:14}}>
                <div style={{fontSize:10,color:"#d4a24e",fontWeight:600,letterSpacing:".08em",marginBottom:8}}>VERGLEICH</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr>{["","Objekt","Score","Preis","m²","/m²","Lage",""].map((h,i)=>(
                    <th key={i} style={{textAlign:i>1&&i<6?"right":"left",padding:"4px 5px",color:"#4a4540",fontWeight:500,borderBottom:"1px solid #1f1d17",fontSize:10}}>{h}</th>
                  ))}</tr></thead>
                  <tbody>{filtered.map((l,i)=>{const v2=vi(l.verdict);return(
                    <tr key={i}>
                      <td style={{padding:"5px 3px",color:favs.has(l.id)?"#d4a24e":"#1f1d17",fontSize:13}}>{favs.has(l.id)?"★":"·"}</td>
                      <td style={{padding:5,color:"#a8a090",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.title}</td>
                      <td style={{padding:5,textAlign:"right",fontWeight:700,color:sc(l.scores?.overall),fontFamily:"monospace"}}>{l.scores?.overall}</td>
                      <td style={{padding:5,textAlign:"right",color:"#8a8070"}}>{l.price_mad?(l.price_mad/1000).toFixed(0)+"k":"—"}</td>
                      <td style={{padding:5,textAlign:"right",color:"#8a8070"}}>{l.area_sqm||"—"}</td>
                      <td style={{padding:5,textAlign:"right",color:"#8a8070"}}>{l.price_per_sqm_mad?(l.price_per_sqm_mad/1000).toFixed(1)+"k":"—"}</td>
                      <td style={{padding:5,color:"#8a8070"}}>{l.neighborhood||"—"}</td>
                      <td style={{padding:5}}><Pill color={v2.c} bg={v2.bg}>{v2.i}</Pill></td>
                    </tr>)})}</tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App/>,document.getElementById("root"));
  </script>
</body>
</html>
